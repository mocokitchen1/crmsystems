<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactions - Grissenda Euphorias CRM</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            Grissenda CRM
        </div>
        <div class="sidebar-menu">
            <a href="index.html"><i class="fas fa-home"></i> Dashboard</a>
            <a href="customers.html"><i class="fas fa-users"></i> Customers</a>
            <a href="deals.html"><i class="fas fa-handshake"></i> Deals</a>
            <a href="tasks.html"><i class="fas fa-tasks"></i> Tasks</a>
            <a href="interactions.html" class="active"><i class="fas fa-comments"></i> Interactions</a>
            <a href="reports.html"><i class="fas fa-chart-line"></i> Reports</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <div class="page-title">Interaction Logs</div>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="openModal()">+ Log Interaction</button>
            </div>
        </header>

        <!-- Interactions Timeline -->
        <div id="interactionTimeline" style="max-width: 800px; margin: 0 auto;">
            <!-- Interactions will be loaded here -->
        </div>
    </main>

    <!-- Add Interaction Modal -->
    <div id="interactionModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;">Log New Interaction</h2>
            <form id="interactionForm">
                <div class="form-group">
                    <label>Related Customer *</label>
                    <select id="intCustomer" class="form-control" required>
                        <option value="">Select Customer</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Interaction Type *</label>
                    <select id="intType" class="form-control" required>
                        <option value="Call">Call</option>
                        <option value="WhatsApp">WhatsApp Message</option>
                        <option value="Meeting">Meeting</option>
                        <option value="Email">Email</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes *</label>
                    <textarea id="intNotes" class="form-control" rows="4" required placeholder="What was discussed?"></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Log Interaction</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/interactions.js"></script>
</body>
</html>
